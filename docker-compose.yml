version: '3.8'

services:
  # --- PROXY REVERSO (HTTPS) ---
  caddy:
    image: caddy:2-alpine
    container_name: marombai_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - n8n

  # --- BANCO DE DADOS ---
  db:
    image: postgres:15-alpine
    container_name: marombai_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: marombai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data

  # --- BACKEND (PYTHON) ---
  backend:
    build: ./backend
    container_name: marombai_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - n8n
    environment:
      WEBHOOK_URL: "http://n8n:5678/webhook/gerar-treino"
      DATABASE_URL: "postgresql://admin:password123@db:5432/marombai_db"

  # --- FRONTEND (REACT) ---
  frontend:
    build: ./frontend
    container_name: marombai_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # --- INTELIGÊNCIA (n8n) ---
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: marombai_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=marombai_n8n_secure
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    links:
      - db

volumes:
  n8n_data:
  postgres_data_v2:
  caddy_data:
  caddy_config:

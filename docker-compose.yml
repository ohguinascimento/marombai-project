version: '3.8'

services:
  # --- PROXY REVERSO (HTTPS) ---
  caddy:
    image: caddy:2-alpine
    container_name: marombai_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - n8n

  # --- BANCO DE DADOS ---
  db:
    image: postgres:15-alpine
    container_name: marombai_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-marombai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data

  # --- BACKEND (PYTHON) ---
  backend:
    build: ./backend
    container_name: marombai_backend
    restart: always
    # Removemos ports e usamos expose para que apenas o Caddy o enxergue
    expose:
      - "8000"
    depends_on:
      - db
      - n8n
    environment:
      ENV: ${ENV:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY}
      N8N_USER: ${N8N_USER}
      N8N_PASSWORD: ${N8N_PASSWORD}
      WEBHOOK_URL: ${WEBHOOK_URL_TREINO}
      WEBHOOK_URL_DIETA: ${WEBHOOK_URL_DIETA}
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - ./logs:/app/logs

  # --- FRONTEND (REACT) ---
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://api.marombai.app
    container_name: marombai_frontend
    restart: always
    # Em produção, não precisamos expor a porta 5173 nem montar volumes de código
    expose:
      - "80"
    depends_on:
      - backend

  # --- INTELIGÊNCIA (n8n) ---
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: marombai_n8n
    restart: always
    # Removemos ports para forçar o tráfego via Caddy (HTTPS)
    expose:
      - "5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    links:
      - db

volumes:
  n8n_data:
  postgres_data_v2:
  caddy_data:
  caddy_config:
